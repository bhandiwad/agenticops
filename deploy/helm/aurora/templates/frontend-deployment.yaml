apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurora.fullname" . }}-frontend
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCounts.frontend }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-frontend
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.app.existingSecret }}
        checksum/secret-app: {{ include (print $.Template.BasePath "/secret-app.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-frontend
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      serviceAccountName: {{ include "aurora.fullname" . }}-frontend
      automountServiceAccountToken: false
      securityContext:
        {{- include "aurora.podSecurityContext" (dict "service" "frontend" "global" $ "defaults" (dict "runAsUser" 1000 "runAsGroup" 1000 "fsGroup" 1000)) | nindent 8 }}
      {{- if or .Values.image.pullSecrets (and .Values.frontendImage .Values.frontendImage.pullSecrets) }}
      imagePullSecrets:
        {{- if and .Values.frontendImage .Values.frontendImage.pullSecrets }}
        {{- toYaml .Values.frontendImage.pullSecrets | nindent 8 }}
        {{- else }}
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
        {{- end }}
      {{- end }}
      {{- include "aurora.scheduling" (dict "service" "frontend" "global" $) | nindent 6 }}
      containers:
        - name: aurora-frontend
          image: "{{ if and .Values.frontendImage .Values.frontendImage.tag }}{{ .Values.frontendImage.registry }}/{{ .Values.frontendImage.repository }}:{{ .Values.frontendImage.tag }}{{ else }}{{ .Values.image.registry }}/aurora-frontend:{{ .Values.image.tag }}{{ end }}"
          imagePullPolicy: IfNotPresent
          securityContext:
            {{- include "aurora.containerSecurityContext" (dict "service" "frontend" "global" $ "defaults" (dict)) | nindent 12 }}
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            # --- From configmap ---
            {{- $configMapName := (include "aurora.fullname" .) }}
            {{- $frontendKeys := list "AURORA_ENV" "FRONTEND_URL" "BACKEND_URL" "NEXT_PUBLIC_BACKEND_URL" "NEXT_PUBLIC_WEBSOCKET_URL" "PUBLIC_API_URL" "PUBLIC_WS_URL" }}
            {{- range $key := $frontendKeys }}
            - name: {{ $key }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $configMapName }}-config
                  key: {{ $key }}
            {{- end }}
            # Feature flags (NEXT_PUBLIC_ENABLE_*)
            {{- range $key, $value := .Values.config }}
            {{- if hasPrefix "NEXT_PUBLIC_ENABLE_" $key }}
            - name: {{ $key }}
              valueFrom:
                configMapKeyRef:
                  name: {{ $configMapName }}-config
                  key: {{ $key }}
            {{- end }}
            {{- end }}
            # Auth.js derives redirect URLs from AUTH_URL
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: {{ $configMapName }}-config
                  key: AUTH_URL
            # --- From app secret (cherry-picked) ---
            {{- $appSecretName := (include "aurora.secretName.app" .) }}
            {{- range $key := list "AUTH_SECRET" "INTERNAL_API_SECRET" }}
            - name: {{ $key }}
              valueFrom:
                secretKeyRef:
                  name: {{ $appSecretName }}
                  key: {{ $key }}
            {{- end }}
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 6
          resources:
            {{- toYaml .Values.resources.frontend | nindent 12 }}
