apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurora.fullname" . }}-chatbot
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCounts.chatbot }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-chatbot
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.db.existingSecret }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secret-db.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.backend.existingSecret }}
        checksum/secret-backend: {{ include (print $.Template.BasePath "/secret-backend.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.app.existingSecret }}
        checksum/secret-app: {{ include (print $.Template.BasePath "/secret-app.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.llm.existingSecret }}
        checksum/secret-llm: {{ include (print $.Template.BasePath "/secret-llm.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-chatbot
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      serviceAccountName: {{ include "aurora.fullname" . }}-chatbot
      # Pod isolation requires K8s API access to create terminal pods
      automountServiceAccountToken: {{ eq .Values.config.ENABLE_POD_ISOLATION "true" }}
      securityContext:
        {{- include "aurora.podSecurityContext" (dict "service" "chatbot" "global" $ "defaults" (dict "runAsUser" 1000 "runAsGroup" 1000 "fsGroup" 1000)) | nindent 8 }}
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      {{- include "aurora.scheduling" (dict "service" "chatbot" "global" $) | nindent 6 }}
      containers:
        - name: aurora-chatbot
          image: "{{ .Values.image.registry }}/aurora-server:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["python", "main_chatbot.py"]
          securityContext:
            {{- include "aurora.containerSecurityContext" (dict "service" "chatbot" "global" $ "defaults" (dict)) | nindent 12 }}
          ports:
            - name: ws
              containerPort: 5006
            - name: health
              containerPort: 5007
          envFrom:
            - configMapRef:
                name: {{ include "aurora.fullname" . }}-config
            - secretRef:
                name: {{ include "aurora.secretName.db" . }}
            - secretRef:
                name: {{ include "aurora.secretName.backend" . }}
            - secretRef:
                name: {{ include "aurora.secretName.app" . }}
            - secretRef:
                name: {{ include "aurora.secretName.llm" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: terraform-workdir
              mountPath: /app/terraform_workdir
            {{- if .Values.ssl.caCertSecret }}
            - name: ssl-ca-cert
              mountPath: {{ .Values.ssl.caCertMountPath }}
              readOnly: true
            {{- end }}
          startupProbe:
            tcpSocket:
              port: 5006
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            tcpSocket:
              port: 5006
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 5007
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.chatbot | nindent 12 }}
      volumes:
        - name: terraform-workdir
          emptyDir: {}
        {{- if .Values.ssl.caCertSecret }}
        - name: ssl-ca-cert
          secret:
            secretName: {{ .Values.ssl.caCertSecret }}
        {{- end }}
