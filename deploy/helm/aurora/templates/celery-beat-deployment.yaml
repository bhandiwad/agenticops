apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurora.fullname" . }}-celery-beat
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCounts.celeryBeat }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-celery-beat
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.db.existingSecret }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secret-db.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.backend.existingSecret }}
        checksum/secret-backend: {{ include (print $.Template.BasePath "/secret-backend.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.app.existingSecret }}
        checksum/secret-app: {{ include (print $.Template.BasePath "/secret-app.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-celery-beat
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      serviceAccountName: {{ include "aurora.fullname" . }}-celery-beat
      automountServiceAccountToken: false
      securityContext:
        {{- include "aurora.podSecurityContext" (dict "service" "celeryBeat" "global" $ "defaults" (dict "runAsUser" 1000 "runAsGroup" 1000 "fsGroup" 1000)) | nindent 8 }}
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      {{- include "aurora.scheduling" (dict "service" "celeryBeat" "global" $) | nindent 6 }}
      containers:
        - name: celery-beat
          image: "{{ .Values.image.registry }}/aurora-server:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["celery", "-A", "celery_config", "beat", "--loglevel=info", "--pidfile=/tmp/celerybeat.pid", "--schedule=/tmp/celerybeat-schedule"]
          securityContext:
            {{- include "aurora.containerSecurityContext" (dict "service" "celeryBeat" "global" $ "defaults" (dict)) | nindent 12 }}
          # Beat doesn't serve HTTP; use pidfile-based liveness check
          livenessProbe:
            exec:
              command:
                - /bin/sh
                - -c
                - "test -f /tmp/celerybeat.pid && kill -0 $(cat /tmp/celerybeat.pid)"
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 10
            failureThreshold: 3
          envFrom:
            - configMapRef:
                name: {{ include "aurora.fullname" . }}-config
            - secretRef:
                name: {{ include "aurora.secretName.db" . }}
            - secretRef:
                name: {{ include "aurora.secretName.backend" . }}
            - secretRef:
                name: {{ include "aurora.secretName.app" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources.celeryBeat | nindent 12 }}
          {{- if .Values.ssl.caCertSecret }}
          volumeMounts:
            - name: ssl-ca-cert
              mountPath: {{ .Values.ssl.caCertMountPath }}
              readOnly: true
          {{- end }}
      {{- if .Values.ssl.caCertSecret }}
      volumes:
        - name: ssl-ca-cert
          secret:
            secretName: {{ .Values.ssl.caCertSecret }}
      {{- end }}
