apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "aurora.fullname" . }}-server
  labels:
    {{- include "aurora.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.server.enabled }}
  replicas: {{ .Values.replicaCounts.server }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "aurora.name" . }}-server
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if not .Values.secrets.db.existingSecret }}
        checksum/secret-db: {{ include (print $.Template.BasePath "/secret-db.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.backend.existingSecret }}
        checksum/secret-backend: {{ include (print $.Template.BasePath "/secret-backend.yaml") . | sha256sum }}
        {{- end }}
        {{- if not .Values.secrets.app.existingSecret }}
        checksum/secret-app: {{ include (print $.Template.BasePath "/secret-app.yaml") . | sha256sum }}
        {{- end }}
      labels:
        app.kubernetes.io/name: {{ include "aurora.name" . }}-server
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/part-of: aurora
    spec:
      serviceAccountName: {{ include "aurora.fullname" . }}-server
      # Pod isolation requires K8s API access to create terminal pods
      automountServiceAccountToken: {{ eq .Values.config.ENABLE_POD_ISOLATION "true" }}
      securityContext:
        {{- include "aurora.podSecurityContext" (dict "service" "server" "global" $ "defaults" (dict "runAsUser" 1000 "runAsGroup" 1000 "fsGroup" 1000)) | nindent 8 }}
      {{- if .Values.image.pullSecrets }}
      imagePullSecrets:
        {{- toYaml .Values.image.pullSecrets | nindent 8 }}
      {{- end }}
      {{- include "aurora.scheduling" (dict "service" "server" "global" $) | nindent 6 }}
      containers:
        - name: aurora-server
          image: "{{ .Values.image.registry }}/aurora-server:{{ .Values.image.tag }}"
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - gunicorn main_compute:app --bind 0.0.0.0:5080 -k gthread --threads ${GUNICORN_THREADS:-4} --workers ${GUNICORN_WORKERS:-2} --timeout 300 --preload
          securityContext:
            {{- include "aurora.containerSecurityContext" (dict "service" "server" "global" $ "defaults" (dict)) | nindent 12 }}
          ports:
            - name: http
              containerPort: 5080
          envFrom:
            - configMapRef:
                name: {{ include "aurora.fullname" . }}-config
            - secretRef:
                name: {{ include "aurora.secretName.db" . }}
            - secretRef:
                name: {{ include "aurora.secretName.backend" . }}
            - secretRef:
                name: {{ include "aurora.secretName.app" . }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: terraform-workdir
              mountPath: /app/terraform_workdir
            {{- if .Values.ssl.caCertSecret }}
            - name: ssl-ca-cert
              mountPath: {{ .Values.ssl.caCertMountPath }}
              readOnly: true
            {{- end }}
          startupProbe:
            httpGet:
              path: /health/liveness
              port: 5080
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 30
          readinessProbe:
            httpGet:
              path: /health/readiness
              port: 5080
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health/liveness
              port: 5080
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.resources.server | nindent 12 }}
      volumes:
        - name: terraform-workdir
          emptyDir: {}
        {{- if .Values.ssl.caCertSecret }}
        - name: ssl-ca-cert
          secret:
            secretName: {{ .Values.ssl.caCertSecret }}
        {{- end }}
